kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: local-dind-cluster
networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
nodes:
  # Single-node profile (default): one untainted control-plane that also runs
  # workloads. Both data pools are mounted on this node and both pool labels
  # are applied, so any workload that selects pool-1 OR pool-2 lands here.
  - role: control-plane
    image: kindest/node:v1.35.1@sha256:05d7bcdefbda08b4e038f644c4df690cdac3fba8b06f8289f30e10026720a1ab
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "gitops-flux.local/data-pool-1=true,gitops-flux.local/data-pool-2=true"
          taints: []
    extraMounts:
      - hostPath: ${SCRIPT_DIR}/data-pool-1
        containerPath: /mnt/data-pool-1
      - hostPath: ${SCRIPT_DIR}/data-pool-2
        containerPath: /mnt/data-pool-2
