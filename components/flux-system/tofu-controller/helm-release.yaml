apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  chart:
    spec:
      chart: tofu-controller
      sourceRef:
        kind: HelmRepository
        name: tofu-controller
      # 0.16.0-rc.5 shipped the chart's bundled aws-package OCIRepository
      # with apiVersion: source.toolkit.fluxcd.io/v1beta2 — that API was
      # removed in current Flux, so helm install errored "no matches for
      # kind OCIRepository in version source.toolkit.fluxcd.io/v1beta2".
      # 0.16.3 (stable) uses v1.
      version: '0.16.3'
  interval: 1h0s
  releaseName: tofu-controller
  targetNamespace: flux-system
  install:
    crds: Create
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  values:
    replicaCount: 3
    concurrency: 24
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 400m
        memory: 64Mi
    caCertValidityDuration: 24h
    certRotationCheckFrequency: 30m
    image:
      tag: v0.16.3
    runner:
      image:
        tag: v0.16.3
      grpc:
        maxMessageSize: 30
