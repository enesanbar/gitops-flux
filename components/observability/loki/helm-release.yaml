apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 1h
  releaseName: loki
  chart:
    spec:
      chart: loki
      version: "6.16.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
        retention_period: 168h
        # Promote session.id and prompt.id from OTLP attributes to indexed
        # Loki stream labels. Without this, they live as structured metadata
        # and cannot be matched in the stream selector `{...}` — which is the
        # only thing Grafana's tracesToLogsV2 button generates. Keep the
        # promotion list tight; each indexed label multiplies cardinality.
        # Loki normalizes dots to underscores: session.id → session_id label.
        otlp_config:
          resource_attributes:
            attributes_config:
              - action: index_label
                attributes:
                  - service.name
                  - service.namespace
                  - service.version
                  - session.id
          log_attributes:
            - action: index_label
              attributes:
                - session.id
                - prompt.id
      ingester:
        chunk_encoding: snappy
      pattern_ingester:
        enabled: true
      ruler:
        enable_api: true
    singleBinary:
      replicas: 1
      persistence:
        enabled: false
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    minio:
      enabled: false
    gateway:
      enabled: false
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      lokiCanary:
        enabled: false
    test:
      enabled: false
