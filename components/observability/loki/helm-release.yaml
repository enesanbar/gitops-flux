apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 1h
  releaseName: loki
  chart:
    spec:
      chart: loki
      version: "6.16.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
        retention_period: 168h
        # Promote session.id from the OTLP Resource into an indexed Loki
        # stream label — necessary for Grafana's tracesToLogsV2 button,
        # which only generates queries against indexed labels (not
        # structured metadata). Loki normalizes dots to underscores at
        # ingest, so the resulting label is session_id.
        #
        # NOTE: Loki only accepts `action: index_label` under
        # resource_attributes — log_attributes and scope_attributes can
        # only do structured_metadata/drop. That makes prompt.id (a
        # log-record attribute, not a resource attribute) un-promotable
        # without a collector-side transform processor that copies it up
        # to the Resource. Acceptable trade-off for dev — session_id
        # already narrows the pivot to a single Claude Code session;
        # users can filter further by prompt_id inside the logs view
        # via structured-metadata pipe syntax: | prompt_id="..."
        otlp_config:
          resource_attributes:
            attributes_config:
              - action: index_label
                attributes:
                  - service.name
                  - service.namespace
                  - service.version
                  - session.id
      ingester:
        chunk_encoding: snappy
      pattern_ingester:
        enabled: true
      ruler:
        enable_api: true
    singleBinary:
      replicas: 1
      persistence:
        enabled: false
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    minio:
      enabled: false
    gateway:
      enabled: false
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      lokiCanary:
        enabled: false
    test:
      enabled: false
