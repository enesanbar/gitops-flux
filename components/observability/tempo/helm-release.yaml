apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: observability
spec:
  interval: 1h
  releaseName: tempo
  chart:
    spec:
      chart: tempo
      version: "1.10.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    tempo:
      reportingEnabled: false
      metricsGenerator:
        enabled: true
        remoteWriteUrl: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    persistence:
      enabled: false
    serviceMonitor:
      enabled: false

    # Override the chart's top-level tempo.yaml template. The default
    # hardcodes `metrics_generator_processors: [service-graphs, span-metrics]`
    # and does not expose any way to set `metrics_generator.processor` —
    # without that block the local-blocks processor is never instantiated
    # and TraceQL metric queries (rate(), quantile(), histogram_over_time)
    # error with "localblocks processor not found" from Grafana's
    # Traces Drilldown. Add local-blocks to the processors list and its
    # config stanza here. The {{ .Values… }} substitutions are kept
    # verbatim because the chart re-runs `tpl` on this value.
    config: |
      multitenancy_enabled: {{ .Values.tempo.multitenancyEnabled }}
      usage_report:
        reporting_enabled: {{ .Values.tempo.reportingEnabled }}
      compactor:
        compaction:
          block_retention: {{ .Values.tempo.retention }}
      distributor:
        receivers:
          {{- toYaml .Values.tempo.receivers | nindent 10 }}
      ingester:
        {{- toYaml .Values.tempo.ingester | nindent 8 }}
      server:
        {{- toYaml .Values.tempo.server | nindent 8 }}
      storage:
        {{- toYaml .Values.tempo.storage | nindent 8 }}
      querier:
        {{- toYaml .Values.tempo.querier | nindent 8 }}
      query_frontend:
        {{- toYaml .Values.tempo.queryFrontend | nindent 8 }}
      overrides:
        defaults:
          metrics_generator:
            processors:
              - service-graphs
              - span-metrics
              - local-blocks
      metrics_generator:
        processor:
          local_blocks: {}
        storage:
          path: /tmp/tempo
          remote_write:
            - url: {{ .Values.tempo.metricsGenerator.remoteWriteUrl }}
