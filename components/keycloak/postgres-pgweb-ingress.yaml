apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: postgres-pgweb
  namespace: keycloak
  annotations:
    cert-manager.io/cluster-issuer: mkcert-issuer
spec:
  ingressClassName: nginx
  rules:
  - host: keycloak-postgres.kindcluster.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pgweb
            port:
              number: 8081
  tls:
    - hosts:
      - keycloak-postgres.kindcluster.dev
      secretName: keycloak-postgres-tls
