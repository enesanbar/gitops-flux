apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: elasticsearch
  namespace: monitoring
spec:
  values:
    replicas: 1

    # The readiness probe runs `GET /_cluster/health?wait_for_status=…` with whatever value this is set to.
    # The chart default is `green`, which a single-node cluster can never reach:
    # any index that defaults to number_of_replicas>=1 will have an unassigned replica shard
    # (impossible to allocate with 1 node) and the cluster stays yellow.
    #
    # Result: pod runs but readiness probe fails forever and the StatefulSet never becomes Ready.
    # `yellow` accepts "all primaries allocated, replicas optional"
    # which is the right bar for a single-node dev cluster.
    clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"

    secret:
      enabled: true
      password: "password" # move to external secret

    volumeClaimTemplate:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 30Gi

    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: mkcert-issuer
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"

      className: "nginx"
      pathtype: ImplementationSpecific
      hosts:
        - host: elasticsearch.kindcluster.dev
          paths:
            - path: /
      tls:
        - secretName: elasticsearch-tls
          hosts:
            - elasticsearch.kindcluster.dev
