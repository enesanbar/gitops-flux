apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  values:
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: mkcert-issuer

      ingressClassName: nginx

      hosts:
        - host: headlamp.kindcluster.dev
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - hosts:
            - headlamp.kindcluster.dev
          secretName: headlamp-tls
