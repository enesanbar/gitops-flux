apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  values:
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: mkcert-issuer

      ingressClassName: nginx

      hosts:
        - host: headlamp.kindcluster.dev
          paths:
            - path: /
              # Chart maps this to the rendered Ingress's pathType field.
              # The intuitive `pathType:` key here would silently render as
              # an empty pathType — which K8s rejects ("Required value").
              type: ImplementationSpecific
      tls:
        - hosts:
            - headlamp.kindcluster.dev
          secretName: headlamp-tls
