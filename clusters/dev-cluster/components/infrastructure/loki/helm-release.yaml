apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  values:
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 5Gi
        accessModes:
          - ReadWriteOnce
      resources:
        limits:
          cpu: 1
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi
